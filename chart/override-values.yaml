########################################################
# Override values — copy this file and fill in your env
########################################################

namespace: cloudlet-manager

backend:
  image:
    repository: ""   # e.g. registry.internal.example.com/cloudlet-manager/backend
    tag: "2.0.0"
  replicas: 1

frontend:
  image:
    repository: ""   # e.g. registry.internal.example.com/cloudlet-manager/frontend
    tag: "2.0.0"
  replicas: 1

oauthProxy:
  image:
    repository: ""   # e.g. registry.internal.example.com/oauth2-proxy/oauth2-proxy
    tag: "v7.7.1"

git:
  provider: "gitlab" # "github" (also Gitea) or "gitlab"
  specRepo: ""       # e.g. "myorg/cloudlets-spec" or "group/subgroup/project"
  specBranch: "main"
  apiUrl: ""         # e.g. "https://gitlab.example.com/api/v4"

sso:
  enabled: true
  keycloakUrl: ""    # e.g. "https://keycloak.apps.cluster.example.com"
  realm: ""          # e.g. "myrealm"
  clientId: ""       # e.g. "cloudlet-manager"
  allowedGroups:
    - "/cloudlet-admins"
  skipTlsVerify: false

route:
  host: ""           # e.g. "cloudlet-manager.apps.cluster.example.com"
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

imagePullSecret: ""  # e.g. "registry-pull-secret"

corsOrigins: '["*"]'
branchCacheTtl: 300

vault:
  enabled: true
  secretStoreName: "vault-backend"
  secretStoreKind: "ClusterSecretStore"
  refreshInterval: "1h"
  paths:
    gitToken: "secret/data/cloudlet-manager/git"
    ssoClientSecret: "secret/data/cloudlet-manager/sso"
    oauthCookieSecret: "secret/data/cloudlet-manager/oauth-proxy"
