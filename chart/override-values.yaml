namespace: cloudlet-manager

backend:
  image:
    repository: quay.io/dbirenfe/cloudlet-backend
    tag: "1.3.1"
  replicas: 1

frontend:
  image:
    repository: quay.io/dbirenfe/cloudlet-frontend
    tag: "1.3.2"
  replicas: 1

oauthProxy:
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.7.1"

git:
  specRepo: "dbirenfe/cloudlets-spec"
  specBranch: "main"
  apiUrl: "https://api.github.com"

sso:
  enabled: true
  keycloakUrl: "https://rhbk-rhbk.apps.cluster-nf2q4.dynamic2.redhatworkshops.io"
  realm: "myrealm"
  clientId: "cloudlet-manager"
  allowedGroups:
    - "/cloudlet-admins"

route:
  host: "cloudlet-manager-cloudlet-manager.apps.cluster-nf2q4.dynamic2.redhatworkshops.io"
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

imagePullSecret: "quay-pull-secret"

corsOrigins: '["*"]'
branchCacheTtl: 300

vault:
  enabled: false
