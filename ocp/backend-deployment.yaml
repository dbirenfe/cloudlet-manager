apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudlet-backend
  namespace: cloudlet-manager
  labels:
    app: cloudlet-backend
    app.kubernetes.io/part-of: cloudlet-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudlet-backend
  template:
    metadata:
      labels:
        app: cloudlet-backend
    spec:
      containers:
        - name: backend
          image: image-registry.openshift-image-registry.svc:5000/cloudlet-manager/cloudlet-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: cloudlet-manager-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cloudlet-backend
  namespace: cloudlet-manager
  labels:
    app: cloudlet-backend
spec:
  selector:
    app: cloudlet-backend
  ports:
    - port: 8000
      targetPort: 8000
