apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudlet-frontend
  namespace: cloudlet-manager
  labels:
    app: cloudlet-frontend
    app.kubernetes.io/part-of: cloudlet-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudlet-frontend
  template:
    metadata:
      labels:
        app: cloudlet-frontend
    spec:
      containers:
        - name: frontend
          image: image-registry.openshift-image-registry.svc:5000/cloudlet-manager/cloudlet-frontend:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cloudlet-frontend
  namespace: cloudlet-manager
  labels:
    app: cloudlet-frontend
spec:
  selector:
    app: cloudlet-frontend
  ports:
    - port: 8080
      targetPort: 8080
